    - name: SV A05.Pumpe Zirkulation
      slave: 1
      unit_of_measurement: V
      scale: 0.01
      precision: 0
      input_type: input
      address: 33284
      scan_interval: 30

    - name: SV A12.Brennerstatus
      slave: 1
      unit_of_measurement: V
      scale: 0.01
      precision: 0
      input_type: input
      address: 33291
      scan_interval: 30

    - name: SV WW Nachheizung 2322
      slave: 1
      #unit_of_measurement: V
      #scale: 0.01
      #precision: 0
      input_type: holding
      address: 2322
      scan_interval: 30

    - name: SV HKR1 Betriebsart
      slave: 1
      input_type: holding
      address: 2818
      scan_interval: 30

    - name: SV HKR2 Betriebsart
      slave: 1
      input_type: holding
      address: 3074
      scan_interval: 30

