    - name: SV Durchfluss Warmwasserzirkualation
      unit_of_measurement: l/min
      slave: 1
      precision: 2
      scale: 0.1
      input_type: input
      address: 33041
      scan_interval: 30

    - name: SV Laufzeit Brenner
      unit_of_measurement: h
      slave: 1
      precision: 0
      input_type: input
      address: 33536
      scan_interval: 30

    - name: SV Brennerstarts
      unit_of_measurement: Starts
      slave: 1
      precision: 0
      input_type: input
      address: 33537
      scan_interval: 30

    - name: SV Brennerleistung
      unit_of_measurement: kW
      scale: 0.1
      slave: 1
      precision: 1
      input_type: input
      address: 33539
      scan_interval: 30

    - name: SV Ionisationsstrom
      unit_of_measurement: mA
      slave: 1
      scale: 0.1
      precision: 1
      input_type: input
      address: 33540
      scan_interval: 30

    - name: SV A01.Pumpe Zirkulation
      slave: 1
      unit_of_measurement: V
      scale: 0.01
      precision: 0
      input_type: input
      address: 33280
      scan_interval: 30

    - name: SV A02.Pumpe Warmwasser
      slave: 1
      unit_of_measurement: V
      scale: 0.01
      precision: 0
      input_type: input
      address: 33281
      scan_interval: 30

    - name: SV A03.Pumpe HK1
      slave: 1
      unit_of_measurement: V
      scale: 0.01
      precision: 0
      input_type: input
      address: 33282
