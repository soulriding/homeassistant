# https://smarthome.ms1.de/projekte/solvis-heizung/

#modbus:
- name: Solvis
  type: tcp
  host: 192.168.82.34
  port: 502
  sensors:
    - name: SV Warmwasserpuffer
      unit_of_measurement: °C
      scale: 0.1
      slave: 1
      precision: 2
      input_type: input
      address: 33024
      scan_interval: 30

    - name: SV Warmwassertemperatur
      unit_of_measurement: °C
      scale: 0.1
      slave: 1
      precision: 2
      input_type: input
      address: 33025
      scan_interval: 30

    - name: SV Speicherreferenztemperatur
      unit_of_measurement: °C
      scale: 0.1
      slave: 1
      precision: 2
      input_type: input
      address: 33026
      scan_interval: 30

    - name: SV Heizungspuffertemperatur oben
      unit_of_measurement: °C
      scale: 0.1
      slave: 1
      precision: 2
      input_type: input
      address: 33027
      scan_interval: 30

    - name: SV Aussentemperatur
      unit_of_measurement: °C
      scale: 0.1
      slave: 1
      precision: 2
      input_type: input
      address: 33033
      scan_interval: 30

    - name: SV Heizungspuffertemperatur unten
      unit_of_measurement: °C
      scale: 0.1
      slave: 1
      precision: 2
      input_type: input
      address: 33032
      scan_interval: 30

    - name: SV Zirkulationsdurchfluss
      unit_of_measurement: °C
      scale: 0.1
      slave: 1
      precision: 2
      input_type: input
      address: 33034
      scan_interval: 30

    - name: SV Vorlauftemperatur HK1
      unique_id: "sv_vorlauftemperature_hk1"
      unit_of_measurement: °C
      scale: 0.1
      slave: 1
      precision: 2
      input_type: input
      address: 33035
      scan_interval: 30

    - name: SV Vorlauftemperatur HK2
      unique_id: "sv_vorlauftemperature_hk2"
      unit_of_measurement: °C
      scale: 0.1
      slave: 1
      precision: 2
      input_type: input
      address: 33036
      scan_interval: 30

    - name: SV Kaltwassertemperatur
      unit_of_measurement: °C
      scale: 0.1
      slave: 1
      precision: 2
      input_type: input
      address: 33038
