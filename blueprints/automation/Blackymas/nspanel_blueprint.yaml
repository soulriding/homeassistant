        groups: '{{ full_list | map(attribute="name") | unique | list }}'
    - repeat:
        for_each: '{{ pages_utilities.groups | selectattr("name", "in", groups) |
          list }}'
        sequence: *id031
  - alias: Home page - Custom buttons
