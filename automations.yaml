- id: '1708462885755'
  alias: FBHZcontrol
  description: ''
  triggers:
  - entity_id:
    - sensor.fbhzcontrol_mode
    trigger: state
  - trigger: time_pattern
    hours: '1'
    minutes: '0'
    seconds: '0'
  conditions: []
  actions:
  - alias: Betriebsart Urlaub
    if:
    - condition: numeric_state
      entity_id: sensor.sv_hkr2_betriebsart
      above: 6.5
      below: 7.5
    then:
    - data:
        hub: Solvis
        unit: 1
        address: 3078
        value: 22
      action: modbus.write_register
    - data:
        hub: Solvis
        unit: 1
        address: 3082
        value: 120
      action: modbus.write_register
    else:
    - if:
      - condition: state
        entity_id: sensor.fbhzcontrol_mode
        state: turbo
      then:
      - data:
          hub: Solvis
          unit: 1
          address: 3078
          value: 22
        action: modbus.write_register
      - data:
          hub: Solvis
          unit: 1
          address: 3082
          value: 120
        action: modbus.write_register
      - data:
          hub: Solvis
          unit: 1
          address: 3074
          value: 2
        action: modbus.write_register
      alias: if turbo
    - if:
      - condition: state
        entity_id: sensor.fbhzcontrol_mode
        state: high
      then:
      - data:
          hub: Solvis
          unit: 1
          address: 3078
          value: 21
        action: modbus.write_register
      - data:
          hub: Solvis
          unit: 1
          address: 3082
          value: 80
        action: modbus.write_register
      - data:
          hub: Solvis
          unit: 1
          address: 3074
          value: 2
        action: modbus.write_register
      alias: if high
    - if:
      - condition: state
        entity_id: sensor.fbhzcontrol_mode
        state: low
      then:
      - data:
          hub: Solvis
          unit: 1
          address: 3078
          value: 19
        action: modbus.write_register
      - data:
          hub: Solvis
          unit: 1
          address: 3082
          value: 60
        action: modbus.write_register
      - data:
          hub: Solvis
          unit: 1
          address: 3074
          value: 2
        action: modbus.write_register
      alias: if low
    - if:
      - condition: state
        entity_id: sensor.fbhzcontrol_mode
        state: 'off'
      then:
      - data:
          hub: Solvis
          unit: 1
          address: 3074
          value: 5
        action: modbus.write_register
      alias: if off
  - data:
      topic: FBHZcontrol/mode "{{ states('sensor.fbhzcontrol_mode') }}"
    action: mqtt.publish
  mode: single
- id: '1708544782588'
  alias: Lightcontrol Livingroom
  description: Lightmode abhängige Regelung von Lightstate
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.bewegungsmelder_wohnzimmer_bewegungsmelder_wohnzimmer_occupancy
    from:
    to: 'on'
  - platform: state
    entity_id:
    - input_select.lightmode_livingroom
    to: auto
    id: to_auto
  - platform: state
    entity_id:
    - input_select.lightmode_livingroom
  condition: []
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_select.lightmode_livingroom
        state: 'on'
      sequence:
      - service: input_select.select_option
        target:
          entity_id: input_select.lightstate_livingroom
        data:
          option: 'on'
    - conditions:
      - condition: state
        entity_id: input_select.lightmode_livingroom
        state: low
      sequence:
      - service: input_select.select_option
        target:
          entity_id: input_select.lightstate_livingroom
        data:
          option: low
    - conditions:
      - condition: state
        entity_id: input_select.lightmode_livingroom
        state: 'off'
      sequence:
      - service: input_select.select_option
        target:
          entity_id: input_select.lightstate_livingroom
        data:
          option: 'off'
    - conditions:
      - condition: state
        entity_id: input_select.lightmode_livingroom
        state: auto
      - condition: or
        conditions:
        - condition: state
          entity_id: binary_sensor.bewegungsmelder_wohnzimmer_bewegungsmelder_wohnzimmer_occupancy
          state: 'on'
          enabled: true
        - condition: state
          entity_id: binary_sensor.bewegungsmelder_wohnzimmer_bewegungsmelder_wohnzimmer_occupancy
          state: 'on'
          enabled: true
      sequence:
      - if:
        - condition: numeric_state
          entity_id: sensor.motion_livingroom_motion_livingroom_illuminance_lux
          below: 20
        then:
        - if: []
          then:
          - service: input_select.select_option
            target:
              entity_id: input_select.lightstate_livingroom
            data:
              option: 'on'
          - delay:
              hours: 0
              minutes: 5
              seconds: 0
              milliseconds: 0
        - if: []
          then:
          - service: input_select.select_option
            target:
              entity_id: input_select.lightstate_livingroom
            data:
              option: low
          - delay:
              hours: 0
              minutes: 10
              seconds: 0
              milliseconds: 0
      - service: input_select.select_option
        target:
          entity_id: input_select.lightstate_livingroom
        data:
          option: 'off'
    - conditions:
      - condition: trigger
        id:
        - to_auto
      sequence:
      - service: input_select.select_option
        metadata: {}
        data:
          option: 'off'
        target:
          entity_id: input_select.lightstate_livingroom
  mode: restart
