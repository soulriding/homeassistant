        metadata: {}
        data:
          brightness: 100
          transition: 3
        target:
          entity_id:
          - light.wz_lowlight1
          - light.wz_lowlight2
      - service: light.turn_on
        metadata: {}
        data:
          hs_color:
          - 10
          - 100
          brightness: 30
        target:
          entity_id: light.light_rgbw_livingroom_window
      - service: light.turn_on
        metadata: {}
        data:
          hs_color:
          - 10
          - 100
          brightness: 100
        target:
          entity_id:
          - light.tasmota_led205_tasmota
          - light.tasmota_led206_tasmota
      - service: light.turn_on
        metadata: {}
        data:
          brightness_pct: 40
        target:
          entity_id:
          - light.tasmota_led200_tasmota_led200_klavier
          - light.mqtt_couchleuchte_tasmota
    - conditions:
      - condition: state
        entity_id: input_select.lightstate_livingroom
        state: 'off'
      sequence:
      - service: light.turn_off
        metadata: {}
        data: {}
        target:
          entity_id:
          - light.wz_lowlight1
          - light.wz_lowlight2
      - service: light.turn_on
        metadata: {}
        data:
          hs_color:
          - 10
          - 100
          transition: 10
          brightness: 0
        target:
          entity_id: light.light_rgbw_livingroom_window
      - service: light.turn_off
        metadata: {}
        data: {}
        target:
          entity_id:
          - light.tasmota_led200_tasmota_led200_klavier
          - light.mqtt_couchleuchte_tasmota
          - light.tasmota_led205_tasmota
          - light.tasmota_led206_tasmota
