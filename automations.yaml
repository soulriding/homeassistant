- id: '1709963544634'
  alias: LightcontrolPresence Vorlage
  description: ''
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.presence_kueche_presence
    from:
    to: 'on'
    id: presence_on
  - platform: state
    entity_id:
    - binary_sensor.presence_kueche_presence
    from:
    to: 'off'
    id: presence_off
  - platform: state
    entity_id:
    - input_select.lightmode_kuche
  - platform: numeric_state
    entity_id:
    - sensor.presence_kueche_illuminance
    above: 500
  condition: []
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_select.lightmode_kuche
        state: 'on'
      sequence:
      - service: input_select.select_option
        target:
          entity_id:
          - input_select.lightstate_kuche
        data:
          option: 'on'
    - conditions:
      - condition: state
        entity_id: input_select.lightmode_kuche
        state: low
      sequence:
      - service: input_select.select_option
        target:
          entity_id:
          - input_select.lightstate_kuche
        data:
          option: low
    - conditions:
      - condition: state
        entity_id: input_select.lightmode_kuche
        state: 'off'
      sequence:
      - service: input_select.select_option
        target:
          entity_id:
          - input_select.lightstate_kuche
        data:
          option: 'off'
    - conditions:
      - condition: state
        entity_id: input_select.lightmode_kuche
        state: auto
      sequence:
      - choose:
        - conditions:
          - condition: numeric_state
            entity_id: sensor.presence_kueche_illuminance
            above: 500
          sequence:
          - service: input_select.select_option
            metadata: {}
            data:
              option: 'off'
            target:
              entity_id: input_select.lightstate_kuche
            alias: Lightstate OFF
          alias: Taghell
        - conditions:
          - condition: state
            entity_id: binary_sensor.presence_kueche_presence
            state: 'on'
          - condition: numeric_state
            entity_id: sensor.presence_kueche_illuminance
            below: 250
          sequence:
          - service: input_select.select_option
            metadata: {}
            data:
              option: 'on'
            target:
              entity_id: input_select.lightstate_kuche
            alias: Lightstate ON
            enabled: true
          alias: Dunkel und Anwesend
        - conditions:
          - condition: trigger
            id:
            - presence_off
          - condition: numeric_state
            entity_id: sensor.presence_kueche_illuminance
            below: 250
          sequence:
          - alias: Lightstate LOW
            service: input_select.select_option
            metadata: {}
            data:
              option: low
            target:
              entity_id: input_select.lightstate_kuche
          - delay:
              hours: 0
              minutes: 0
              seconds: 30
              milliseconds: 0
          - alias: Lightstate OFF
            service: input_select.select_option
            metadata: {}
            data:
              option: 'off'
            target:
              entity_id: input_select.lightstate_kuche
          alias: Dunkel und Abwesend
        default:
        - alias: Lightstate OFF
          service: input_select.select_option
          metadata: {}
          data:
            option: 'off'
          target:
            entity_id: input_select.lightstate_kuche
  mode: restart
