- id: '1751315633401'
  alias: Executer Automatic Luftentfeuchter Gästezimmer
  description: ''
  triggers:
  - minutes: /15
    trigger: time_pattern
  - entity_id:
    - input_select.luftentfeuchter_gz_mode_selector
    trigger: state
  - entity_id:
    - sensor.luftentfeuchter_control
    trigger: state
  conditions: []
  actions:
  - alias: Bedungung Mode Selector on
    if:
    - condition: state
      entity_id: input_select.luftentfeuchter_gz_mode_selector
      state: 'on'
    then:
    - action: switch.turn_on
      target:
        entity_id:
        - switch.sd15
      data: {}
  - alias: Bedungung Mode Selector off
    if:
    - condition: state
      entity_id: input_select.luftentfeuchter_gz_mode_selector
      state: 'off'
    then:
    - action: switch.turn_off
      target:
        entity_id:
        - switch.sd15
      data: {}
  - alias: Bedungung Mode Selector auto force
    if:
    - condition: state
      entity_id: input_select.luftentfeuchter_gz_mode_selector
      state: auto force
    then:
    - if:
      - condition: state
        entity_id: sensor.luftentfeuchter_control
        state: 'on'
      - condition: time
        before: '17:00:00'
      - condition: numeric_state
        entity_id: sensor.solar_power_sum
        below: 1500
      then:
      - metadata: {}
        data: {}
        target:
          entity_id:
          - switch.sd15
        action: switch.turn_on
      else:
      - target:
          entity_id:
          - switch.sd15
        data: {}
        action: switch.turn_off
  - alias: Bedungung Mode Selector auto eco
    if:
    - condition: state
      entity_id: input_select.luftentfeuchter_pk_mode_selector
      state: auto eco
    then:
    - if:
      - condition: numeric_state
        entity_id: sensor.batt_bms_mem
        above: 98
      - condition: numeric_state
        entity_id: sensor.solar_power_sum
        below: 1500
      then:
      - action: switch.turn_on
        target:
          entity_id:
          - switch.sd15
        data: {}
      else:
      - action: switch.turn_off
        target:
          entity_id:
          - switch.sd15
        data: {}
  mode: single
