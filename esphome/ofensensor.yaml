# Example configuration entry
dallas:
  - pin: GPIO2

sensor:
    #Couchseite
  - platform: dallas
    address: 0xe102069245397028
    name: "temp_couchseite"
    id: Tc
    state_topic: ofensensor/sensor/temp_couchseite
    filters:
        median:
          window_size: 5
          send_every: 1   # Ofenseite
  - platform: dallas
    address: 0x910b22820802bd28
    name: "temp_ofenseite"
    id: To
    state_topic: ofensensor/sensor/temp_ofenseite
    accuracy_decimals: 1
    filters:
        median:
          window_size: 5
          send_every: 1
    on_value:
      then:
        - sensor.template.publish:
            id: To_old
            state: !lambda |-
                id(To_diff).publish_state((id(To).raw_state - id(To_old).raw_state)*100);
                return id(To).state;
    # Differenztemperatur
  - platform: template
    name: "temp_ofendelta"
    id: Td
    unit_of_measurement: °C
    state_topic: ofensensor/sensor/temp_ofendelta
    lambda: |-
      return (id(To).state - id(Tc).state);
    # Temperaturgradient *100
  - platform: template
    name: "temp_ofenseite_gradient"
    id: To_diff
    unit_of_measurement: °C
    state_topic: ofensensor/sensor/temp_ofenseite_gradient
    on_value_range:
    - above: -10
      then:
        - sensor.template.publish:
            id: B_cooldown
            state: 0
    - below: -10
      then:
        - sensor.template.publish:
            id: B_cooldown
            state: 1
    filters:
        median:
          window_size: 5
          send_every: 1
    # Alte Temperatur Ofenseite
  - platform: template
    id: To_old
    accuracy_decimals: 1
    # Cooldown-Bit
  - platform: template
    name: "cooldown"
    id: B_cooldown
    state_topic: ofensensor/sensor/cooldown
