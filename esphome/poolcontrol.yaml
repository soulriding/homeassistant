# Time for turn-off-timer in minutes 

number:
  - platform: template
    name: "Time Gartenpumpe"
    id: time_gardenpump
    state_topic: ${clientname}/duration_gardenpump
    command_topic: ${clientname}/setduration_gardenpump
    optimistic: true
    initial_value: 180
    min_value: 5
    max_value: 600
    step: 5
    unit_of_measurement: "min"
  - platform: template
    name: "Solltemperatur Poolpumpe"
    id: temp_pool_setpoint
    state_topic: ${clientname}/temp_PoolSetpoint
    command_topic: ${clientname}/settemp_PoolSetpoint
    optimistic: true
    initial_value: 33
    min_value: 1
    max_value: 42
    step: 1
    unit_of_measurement: "°C"
  - platform: template
    name: "Gas Fehlzündungen Zähler"
    id: count_gasfail
    state_topic: ${clientname}/count_gasfail
    command_topic: ${clientname}/setcount_gasfail
    optimistic: true
    initial_value: 0
    min_value: 0
    max_value: 100
    step: 1
  - platform: template
    name: "Pumpenlaufzeit Pool"
    id: duration_pump
    state_topic: ${clientname}/duration_pump
    command_topic: ${clientname}/setduration_pump
    optimistic: true
    initial_value: 0
    min_value: 0
    max_value: 1440
    step: 1
    unit_of_measurement: "min"

# Use the blue LED in the device as a status LED, which will blink if there are warnings (slow) or errors (fast)
#status_led:
#  pin:
#    number: GPIO5
#    inverted: True

# ================= RELAYS ==========================
switch:
  - platform: gpio
    pin: GPIO16
    name: "Relais Pool Pumpe"
    id: relay_pump
    state_topic: ${clientname}/relay_pump
    command_topic: ${clientname}/setrelay_pump
  - platform: gpio
    pin: GPIO14
    name: "Relais Solarventil"
    id: relay_solarvalve
    state_topic: ${clientname}/relay_solarvalve
    command_topic: ${clientname}/setrelay_solarvalve
  - platform: gpio
    pin: GPIO12
    name: "Relais Heizpumpe"
    id: relay_heatpump
    state_topic: ${clientname}/relay_heatpump
    command_topic: ${clientname}/setrelay_heatpump
  - platform: gpio
    pin: GPIO13
    name: "Relais Gartenpumpe"
    id: relay_gardenpump
    state_topic: ${clientname}/relay_gardenpump
    command_topic: ${clientname}/setrelay_gardenpump
    on_turn_on:
      then:
        - script.stop: timer_gardenpump
        - script.execute: timer_gardenpump
    on_turn_off:
    - script.stop: timer_gardenpump

# ================= TRIGGERS ==========================
  - platform: template
    id: trigger_gardenpump
    name: "Trigger Gartenpumpe"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    command_topic: ${clientname}/trigger_gardenpump
    on_turn_on:
      then:
        - switch.turn_on: relay_gardenpump
        - script.stop: timer_gardenpump
        - script.execute: timer_gardenpump
        - delay: 100ms
        - switch.turn_off: trigger_gardenpump

# ================= SWITCHES ==========================
  - platform: template
    name: "Automatik Solarheizung"
    id: sw_solarautomatic
    state_topic: ${clientname}/Solarautomatic
    command_topic: ${clientname}/setSolarautomatic
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    name: "Automatik Gasheizung"
    id: sw_gasautomatic
    state_topic: ${clientname}/Gasautomatic
    command_topic: ${clientname}/setGasautomatic
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    name: "Automatik Holzheizung"
    id: sw_woodautomatic
    state_topic: ${clientname}/Woodautomatic
    command_topic: ${clientname}/setWoodautomatic
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    name: "Automatik Reinigungspumpen"
    id: sw_cleanautomatic
    state_topic: ${clientname}/Cleanautomatic
    command_topic: ${clientname}/setCleanautomatic
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    name: "Automatik Frostschutz"
    id: sw_freezeautomatic
    state_topic: ${clientname}/Freezeautomatic
    command_topic: ${clientname}/setFreezeautomatic
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true

select:
  - platform: template
    name: "Heizmodus Automatik"
    id: select_automatic
    optimistic: true
    options:
      - "Off"
      - "Solar"
      - "Gas"
      - "Wood"
    initial_option: "Off"
    on_value:
      then:
        - lambda: |-
            if (std::string_view(id(select_automatic).current_option()) == "Off") {
            id(sw_solarautomatic).publish_state(false);
            id(sw_gasautomatic).publish_state(false);
            id(sw_woodautomatic).publish_state(false);
            id(relay_pump).publish_state(false);
            id(relay_solarvalve).publish_state(false);
            id(relay_heatpump).publish_state(false);
            } else if (std::string_view(id(select_automatic).current_option()) == "Solar") {
            id(sw_solarautomatic).publish_state(true);
            id(sw_gasautomatic).publish_state(false);
            id(sw_woodautomatic).publish_state(false);
            id(relay_heatpump).publish_state(false);
            } else if (std::string_view(id(select_automatic).current_option()) == "Gas") {
            id(sw_solarautomatic).publish_state(false);
            id(sw_gasautomatic).publish_state(true);
            id(sw_woodautomatic).publish_state(false);
            id(relay_solarvalve).publish_state(false);
            } else if (std::string_view(id(select_automatic).current_option()) == "Wood") {
            id(sw_solarautomatic).publish_state(false);
            id(sw_gasautomatic).publish_state(false);
            id(sw_woodautomatic).publish_state(true);
            id(relay_solarvalve).publish_state(false);
            id(relay_heatpump).publish_state(false);
            }

  
# ================= TRIGGER-SCRIPTS ==========================
script:
  - id: timer_gardenpump
    then:
      - delay: !lambda "return id(time_gardenpump).state * 1000 * 60;"
      - switch.turn_off: relay_gardenpump
  - id: timer_Freezeautomatic
    then:
      - delay: !lambda "return 150 * 1000;"
      - switch.turn_off: relay_heatpump
      - switch.turn_off: relay_pump
  - id: timer_Cleanautomatic
    then:
      - delay: !lambda "return 30 * 1000 * 60;"
      - switch.turn_off: relay_heatpump
      - switch.turn_off: relay_pump

