  - platform: dallas_temp
    address: 0x1b00000050deac28
    name: "Temp Pool In"
    id: temp_pool_in
    state_topic: ${clientname}/tempPoolIn
  - platform: dallas_temp
    address: 0x40011833bb09ff28
    name: "Temp Pool Out"
    id: temp_pool_out
    state_topic: ${clientname}/tempPoolOut
  - platform: dallas_temp
    address: 0xa0020d9245042f28
    name: "Temp Pool Solar"
    id: temp_pool_solar
    state_topic: ${clientname}/tempPoolSolar
  - platform: dallas_temp
    address: 0x5500000053eeed28
    name: "Temp Pool Ofen"
    id: temp_pool_oven
    state_topic: ${clientname}/tempPoolOven
  - platform: dallas_temp
    address: 0x03000006c6c56a28
    name: "Temp Pool Housing"
    id: temp_pool_housing
    state_topic: ${clientname}/tempPoolHousing
  - platform: dallas_temp
    address: 0x42011833bb76ff28
    name: "Temp Pump Haus"
    id: temp_pump_house
    state_topic: ${clientname}/tempPumphouse


  - platform: mqtt_subscribe
    name: "AhStored"
    id: ahstored
    topic: /home/AhStored
    unit_of_measurement: "Ah"

  - platform: mqtt_subscribe
    name: "SOC_BMS"
    id: soc_bms
    topic: 24VSpeicher_BMS/24VSpeicher_BMS/Pack SOC
    unit_of_measurement: "%"

  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    id: wifi_signal_percent
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"

  - platform: template
    id: control_pool
    name: "Poolregelung"
    lambda: |-
      // INIT POOLREGELUNG
      bool pumpstate = id(relay_pump).state ;
      bool solarvalve = id(relay_solarvalve).state ;
      bool heatpump = id(relay_heatpump).state ;
      float solltemp = id(temp_pool_setpoint).state;                           // Solltemperatur Pool
      int returnval = 0;

      // SOLARREGLER
      if (id(sw_solarautomatic).state and (not id(sw_gasautomatic).state)) {
        if( (id(temp_pool_solar).state > id(temp_pool).state + 5) and (id(temp_pool).state < id(temp_pool_setpoint).state -0.2)){
          pumpstate = 1;
          solarvalve = 1;
          returnval = 1;
        }
        else if ( (id(temp_pool_out).state > id(temp_pool_in).state - 0.05) and id(relay_pump).state){
          solarvalve = 0;
          if (not(id(soc_bms).state >= 100)) {pumpstate = 0;};
          returnval = 2;
        }
        else if ( (id(temp_pool_solar).state < id(temp_pool_out).state + 1) and id(relay_pump).state){
          solarvalve = 0;
          if (not(id(soc_bms).state >= 100)) {pumpstate = 0;};
          returnval = 3;
        }
        else if ( (id(temp_pool).state > id(temp_pool_setpoint).state + 0.2) and id(relay_pump).state){
          solarvalve = 0;
          if (not(id(soc_bms).state >= 100)) {pumpstate = 0;};
          returnval = 4;
        }
      }

      // GASHEIZREGLER
      if (id(sw_gasautomatic).state) {
        if( (id(temp_pool).state < id(temp_pool_setpoint).state - 0.2) and (id(count_gasfail).state < 10) and (not id(relay_heatpump).state)){
          pumpstate = 1;
          solarvalve = 0;
          heatpump = 1;
          returnval = 5;
        }
        else if ( (id(temp_pool).state > id(temp_pool_setpoint).state + 0.2) and id(relay_heatpump).state ){
          pumpstate = 0;
          solarvalve = 0;
          heatpump = 0;
          // PoolGasFailIgnitionCount = 0 setzen und Pushover senden
          if ( id(count_gasfail).state > 0 ){
            auto call = id(count_gasfail).make_call();
            call.set_value(0);
            call.perform();
            //  Pushover info zurückgesetzt senden
            };
          returnval = 6;
        }
        else if ( (id(temp_pool_out).state > id(temp_pool_in).state - 0) and id(relay_heatpump).state){
          pumpstate = 0;
          heatpump = 0;
          //Pushover-Update + 1
          auto call = id(count_gasfail).make_call();
          call.number_increment(true);
          call.perform();
          //  Pushover info Count senden
          returnval = 7;
        }
        //else if ( (id(temp_pool).state < id(temp_pool_oven).state - 2) and (not id(sw_gasautomatic).state) and (not id(relay_heatpump).state)){
        //  Pool Pumpe für 90 sekunden anschalten
        //  returnval = 8;
        //}
      }
      
      // FROSTSCHUTZ
      if (id(sw_freezeautomatic).state and std::min({id(temp_pool_out).state, id(temp_pool_in).state, id(temp_pool).state, id(temp_pump_house).state, id(temp_pool_oven).state}) < 0 ) {
          // timer Poolpume 250s
          pumpstate = 1;
          //id(relay_pump).turn_on();
          //id(timer_Freezeautomatic).stop();
          //id(timer_Freezeautomatic).execute();
          returnval = 9;
        if( id(temp_pump_house).state < 2 and (id(temp_pool).state < 6 or id(temp_pump_house).state <0.5 ) and id(sw_gasautomatic).state){
          // timer Poolpume 150s
          pumpstate = 1;
          heatpump = 1;
          //id(relay_pump).turn_on();
          //id(relay_heatpump).turn_on();
          //id(timer_Freezeautomatic).stop();
          //id(timer_Freezeautomatic).execute();
          returnval = 10;
        }
      }

      // RELAY-UPDATING
      if (pumpstate){
        id(relay_pump).turn_on();
        }
      else {
        id(relay_pump).turn_off();
        }
      if (solarvalve){
        id(relay_solarvalve).turn_on();
        }
      else {
        id(relay_solarvalve).turn_off();
        }
      if (heatpump){
        id(relay_heatpump).turn_on();
        }
      else {
        id(relay_heatpump).turn_off();
        }
      if (returnval == 9){
        id(timer_Freezeautomatic).stop();
        id(timer_Freezeautomatic).execute();
        }
      if (returnval == 10){
        id(timer_Freezeautomatic).stop();
        id(timer_Freezeautomatic).execute();
        }

      if (id(relay_pump).state){
        auto call = id(duration_pump).make_call();
        call.number_increment(true);
        call.perform();
        }
      
    

      return returnval;
    update_interval: 60s

