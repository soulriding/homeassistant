    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org
    on_time:
    - seconds: 0
      minutes: 30
      hours: 20
      then:
       - lambda: |-
            if( id(sw_cleanautomatic).state and (id(temp_pool).state > 17) and (id(duration_pump).state < 30) ){
              id(relay_pump).turn_on();
              id(timer_Cleanautomatic).stop();
              id(timer_Cleanautomatic).execute();
            }
    - seconds: 59
      minutes: 59
      hours: 23
      then:
       - number.to_min: duration_pump

