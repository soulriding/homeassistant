# =============================================== ENERGIEBERECHNUNG BOARDBATTERIE ===============================================
  - platform: template
    name: "3 Energie Boardbatterie"
    id: batt_board_energy
    state_topic: buscontrol/sensor/batt_board_energy
    unit_of_measurement: "Ah"
    lambda: |-
      if (isnan(id(my_energy_board_float))){
        id(my_energy_board_float) = 190;
      }
      id(my_energy_board_float) += float((id(batt_board_current).state / 60));
      
      // SOC ans oberere Limit schieben, wenn Batterie voll ist
      if (id(batt_board_voltage).state >= 14.2) {
        id(my_energy_board_float) += 0.1;
      }
      
      // Limitierung SOC
      if (id(my_energy_board_float) > 200) {
        id(my_energy_board_float) = 200;
      } else if(id(my_energy_board_float) < 0) {
        id(my_energy_board_float) = 0;
      }
      return id(my_energy_board_float);
    update_interval: 60s


# ================================================= REGLER ===============================================
# ------------------ Kühlschrankregelung ------------------
  - platform: template
    id: tempsoll_fridge_dynamic                              # Dynamische Kühlschranksollkorrektur nach Batteriestatus
    name: "2 Kühlschrank Solltemp dynamisch"
    unit_of_measurement: "°C"
    lambda: |-
      int temp_dynamic = id(tempsoll_fridge).state;
      if( id(batt_board_energy).state > 99 ){                // zwei grad kälter wenn Batterie voll
        temp_dynamic -= 2 ;
      }
      else if( id(batt_board_energy).state < 25 ) {          // zwei grad wärmer, wenn Batterie leer
        temp_dynamic += 2 ;
      }
      return temp_dynamic;
    state_topic: buscontrol/number/tempsoll_fridge_dynamic
    update_interval: 60s
  # Kühlschrank Regler
  - platform: template
    id: control_fridge
    lambda: |-
      // INIT KÜHLSCHRANKREGELUNG
      int compressor; // State: 0=off 1=low 2=high
      float tempoffset_fridge_hysterises = 0.2;                                  // Ein/Aus-Hysterese
      float tempoffset_freezer_hysterises = 3;                                  // Ein/Aus-Hysterese
      float temptarget_fridge = id(tempsoll_fridge_dynamic).state;                           // Zieltemperatur Kühlschrank
      float temptarget_freezer = id(tempsoll_freezer).state;                         // Zieltemperatur Gefrierfach
      float tempoffset_battfull = -3;                        // Zieltemperatur-Offset bei voller Batterie (Kühlschrank)
      float tempoffset_battempty = 3;                        // Zieltemperatur-Offset bei leerer Batterie (Kühlschrank)
      
      // BATTERIELADESTAND ANPASSUNG
      //if( id(my_energy_board_float) > 99 ){
      //  temptarget_fridge += tempoffset_battfull;
      //}
      //else if( id(my_energy_board_float) < 30 ) {
      //  temptarget_fridge += tempoffset_battempty;
      //}

      // REGLER zum setzen der Variable compressor
      if(id(fridge_control).state or id(freezer_control).state) {
        // Volle Leistung
        if( ((id(temp_fridge).state > (temptarget_fridge + tempoffset_fridge_hysterises + 2) ) and id(fridge_control).state)
        or ((id(temp_freezer).state > (temptarget_freezer + 2) ) and id(freezer_control).state) and (id(temp_fridge).state > 2) ){
          compressor = 2;
        }
        // Reduzierte Leistung
        else if( ((id(temp_fridge).state > (temptarget_fridge + tempoffset_fridge_hysterises) ) and id(fridge_control).state)
        or ((id(temp_freezer).state > (temptarget_freezer) ) and id(freezer_control).state) and (id(temp_fridge).state > 2) ){
          compressor = 1;
        }
        // AUS
        else if( ((id(temp_fridge).state < temptarget_fridge) and id(fridge_control).state)
        or ((id(temp_freezer).state < (temptarget_freezer - tempoffset_freezer_hysterises)) and id(freezer_control).state) ){
          compressor = 0;
        }
      }
      else{
        compressor = 0;
      }
      // Relais-Ansteuerung durch Variable compressor
      if (compressor == 0 or id(temp_fridge).state < 1 or id(temp_freezer).state < -15) {
        id(relais_compressor_high).turn_off();
        id(relais_compressor).turn_off();
      }
      else if(compressor == 1 and id(temp_fridge).state > 2 and id(temp_freezer).state > -13){
        id(relais_compressor_high).turn_off();
        id(relais_compressor).turn_on();
      }
      else if(compressor == 2 and id(temp_fridge).state > 2 and id(temp_freezer).state > -13){
        id(relais_compressor_high).turn_on();
        id(relais_compressor).turn_off();
      }
      return compressor;
    update_interval: 60s

# ----------------- Lüftungsregelung -------------------
  - platform: template
    id: control_fan
    lambda: |-
      // INIT LÜFTUNGSREGELUNG
      float tempoffset_hysterises = 1;                                     // Ein/Aus-Hysterese Kühlung
      float humidityoffset_hysterises = 5;                                 // Ein/Aus-Hysterese
      
      float temptarget_cool = id(tempsoll_cool).state;                     // Zieltemperatur Kühlung
      float humiditytarget_dry = id(humiditysoll_dry).state;               // Zielfeuchte Trocknen
      float temp_inside = id(temp_in).state;                                                       // Innentemperatur
      float temp_outside = id(temp_out).state;                                                      // Außentemperatur
      float humidity_inside = id(humidity_in_dht).state;                                                   // Innenfeuchtigkeit
      float humidity_outside_calc = id(humidity_out_virtual).state;                                                  // Außenfeuchtigkeit                                            

      // ------ REGLER zum setzen der Variable compressor ------
      if(id(cool_control).state or id(dry_control).state) {
        // Kühlungsregelung
        if( (temp_inside > temptarget_cool + tempoffset_hysterises) and (temp_inside > temp_outside +2) and id(cool_control).state){
          id(relais_fan).turn_on();
        }
        else if( ((temp_inside < temptarget_cool) or (temp_inside < temp_outside +1)) and id(cool_control).state){
          id(relais_fan).turn_off();
        }
        // Feuchteregelung
        else if( (humidity_inside > humiditytarget_dry + humidityoffset_hysterises) and (humidity_inside > humidity_outside_calc +5) and (id(my_energy_board_float) >98) and id(dry_control).state){
          id(relais_fan).turn_on();
        }
        else if( ((humidity_inside < humiditytarget_dry) or (humidity_inside < humidity_outside_calc +3)) and id(dry_control).state){
          id(relais_fan).turn_off();
        }
      }
      else{
        id(relais_fan).turn_off(); // Kühlung/Feuchte Regelung aus
        }
      return id(relais_fan).state;
    update_interval: 60s

