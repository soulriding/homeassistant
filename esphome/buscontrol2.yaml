    # Virtuelle Temperaturen
  - platform: template
    name: "Temp Außen min"
    id: temp_out # Minimale Außentemperatur
    state_topic: buscontrol/sensor/temp_out
    unit_of_measurement: "°C"
    lambda: |-
      return ( min (id(temp_out_front).state, id(temp_out_back).state) );
    update_interval: 60s
  - platform: template
    name: "Temp Innen mean"
    id: temp_in # Mittelwert Innentemperatur
    state_topic: buscontrol/sensor/temp_in
    unit_of_measurement: "°C"
    lambda: |-
      return (id(temp_in_door).state + id(temp_in_front).state + id(temp_in_back).state) / 3 ;
    update_interval: 60s

    # Virtuelle Luftfeuchtigkeit
  - platform: template
    name: "Feuchte Außen bei Innentemperatur"
    id: humidity_out_virtual # Virtuelle Luftfeuchtigkeit außen bei Innentemperatur
    state_topic: buscontrol/sensor/humidity_out_virtual
    unit_of_measurement: "%"
    lambda: |-
      float temp_inside = id(temp_in_dht).state;                                                       // Innentemperatur
      float temp_outside = id(temp_out_dht).state;                                                     // Außentemperatur
      float humidity_inside = id(humidity_in_dht).state;                                               // Innenfeuchtigkeit
      float humidity_outside = id(humidity_out_dht).state;                                             // Außenfeuchtigkeit                                            

      // ---- Berechnung relative Luftfreuchte außen bei innentemperatur ----
      float SDDTaussen = 6.1078 * pow(10 , ( (7.5 * temp_outside) / (237.3 + temp_outside) )); // SDD(T) = 6.1078 * 10^((a*T)/(b+T))
      float DD = humidity_outside / 100 * SDDTaussen;                                  // DD(r,T) = r/100 * SDD(T)
      float v = log(DD / 6.1078) / log(10);
      float TD = 237.3 * v / (7.5 - v);                                            // TD(r,T) = b*v/(a-v) mit v(r,T) = log10(DD(r,T)/6.1078)

      float SDDTD = 6.1078 * pow(10, ( (7.5 * TD) / (237.3 + TD) ));
      float SDDTinnen = 6.1078 * pow(10 , ( (7.5 * temp_inside) / (237.3 + temp_inside) ));
      //my $FeuchteInnen = 100 * $SDDTD / $SDDTinnen;                                     // r(T,TD) = 100 * SDD(TD) / SDD(T)

      return( (humidity_outside * SDDTaussen) / SDDTinnen);          // Außenfeuchtigkeit bei Innentemperatur
    update_interval: 60s
    
          
    # -------------- DHT Feuchte/Temperatursensoren --------------
  - platform: dht
    pin: GPIO33
    model: DHT22
    temperature:
      name: "Temp Innen"
      id: temp_in_dht
      state_topic: buscontrol/sensor/temp_in_dht
    humidity:
      name: "Feuchte Innen"
      id: humidity_in_dht
      state_topic: buscontrol/sensor/humidity_in_dht
