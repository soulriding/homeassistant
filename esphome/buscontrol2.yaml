# ------------- Ansteuerung EPAPER ----------------
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

display:
  - platform: waveshare_epaper
    id: screen
    cs_pin: GPIO5
    dc_pin: GPIO19
    reset_pin: GPIO12
    model: 4.20in
    reset_duration: 200ms
    rotation: 180
    #full_update_every: 30
    update_interval: 60s
    auto_clear_enabled: true
    lambda: |-
      // ICONS
      if(id(fridge_control).state or id(freezer_control).state){
        it.print(25, 0, id(icons), "\U000F028F"); //fridge
        }
      else{
        it.print(25, 0, id(icons), "\U000F11B0"); //fridge off
        }
      if(id(cool_control).state or id(dry_control).state){
        it.print(125, 0, id(icons), "\U000F0210"); //fan
        }
      else{
        it.print(125, 0, id(icons), "\U000F081D"); //fan off
        }
      if(id(heat_control).state){
        it.print(225, 0, id(icons), "\U000F0438"); //radiator
        }
      else
        {
        it.print(225, 0, id(icons), "\U000F0AD8"); //radiator off
        }
      if(id(wifi_control).state){
        it.print(325, 0, id(icons), "\U000F05A9"); //wifi
        }
      else{
        it.print(325, 0, id(icons), "\U000F05AA"); //wifi off
        }
      
      // ICON-Unterschriften
      if(id(freezer_control).state){it.printf(50, 60, id(small), TextAlign::TOP_CENTER, "Soll:%.1f°C", id(tempsoll_freezer).state);};
      if(id(fridge_control).state){it.printf(50, 75, id(small), TextAlign::TOP_CENTER, "Soll:%.1f°C", id(tempsoll_fridge_dynamic).state);};
      if(id(cool_control).state){it.printf(150, 60, id(small), TextAlign::TOP_CENTER, "Soll:%.1f°C", id(tempsoll_cool).state);};
      it.printf(250, 60, id(small), TextAlign::TOP_CENTER, "vorn: %.1f°C", id(temp_in_front).state);
      it.printf(250, 75, id(small), TextAlign::TOP_CENTER, "hinten: %.1f°C", id(temp_in_back).state);
      
      // TEMPERATUREN
      it.line(0, 95, 400, 95);
      // KÜHLSCHRANK
      it.print(0, 130, id(iconssmall), "\U000F1A71"); //fridge
      it.printf(90, 125, id(small), TextAlign::TOP_CENTER, "%.1f°C", id(temp_freezer).state);
      it.printf(90, 135, id(normal), TextAlign::TOP_CENTER, "%.1f°", id(temp_fridge).state);
      //INNEN/AUSSEN
      it.printf(220, 105, id(big), TextAlign::TOP_CENTER, "%.0f%%", id(humidity_in_dht).state);
      it.printf(320, 105, id(big), TextAlign::TOP_CENTER, "%.1f°", id(temp_in_door).state);
      it.printf(220, 150, id(big), TextAlign::TOP_CENTER, "%.0f%%", id(humidity_out_dht).state);   
      it.printf(320, 150, id(big), TextAlign::TOP_CENTER, "%.1f°", id(temp_out).state);
      it.printf(155, 175, id(small), TextAlign::TOP_LEFT, "%.0f%%", id(humidity_out_virtual).state);
      it.printf(380, 130, id(small), TextAlign::CENTER, "IN");
      it.printf(380, 180, id(small), TextAlign::CENTER, "OUT");
      
      // BATTERIE
      it.line(0, 200, 400, 200);
      it.line(110, 200, 110, 300);
      it.line(200, 200, 200, 300);
      
      it.print(130, 205, id(iconssmall), "\U000F010C"); //battery
      it.printf(180, 260, id(normal), TextAlign::TOP_RIGHT, "%.1f", id(batt_start_voltage).state);
      it.printf(180, 265, id(small), TextAlign::TOP_LEFT, "V");
      it.print(220, 205, id(iconssmall), "\U000F1902"); //board battery
      it.printf(275, 260, id(normal), TextAlign::TOP_RIGHT, "%.1f", id(batt_board_voltage).state);
      it.printf(275, 265, id(small), TextAlign::TOP_LEFT, "V");
      it.printf(360, 205, id(big), TextAlign::TOP_RIGHT, "%.1f", id(batt_board_current).state);
      it.printf(360, 210, id(small), TextAlign::TOP_LEFT, "A");
      it.printf(360, 250, id(big), TextAlign::TOP_RIGHT, "%.0f", id(my_energy_board_float));
      it.printf(360, 255, id(small), TextAlign::TOP_LEFT, "Ah");
      
      // ICON-Unterschriften
      it.printf(75, 280, id(small), TextAlign::TOP_LEFT, "%.0f%%", id(wifi_signal_percent).state);
      std::string ssid_string = id(ssid_name).state;
      it.printf(10, 280, id(small), TextAlign::TOP_LEFT, "%s", ssid_string.c_str());
      std::string tpl_hour_sec_string = id(tpl_hour_sec).state;
      it.printf(5, 200, id(big), TextAlign::TOP_LEFT, "%s", tpl_hour_sec_string.c_str());
      


