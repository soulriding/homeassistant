# =============================================== RELAYS ===============================================

# MCP27017 Port Extender hinten
  - platform: gpio
    name: "x Relais Kühlschrank"
    id: relais_compressor
    state_topic: buscontrol/switch/relais_compressor
    pin:
      mcp23xxx: mcp23017_back
      # Use pin A0
      number: 0
      mode:
        output: true
      inverted: true
  - platform: gpio
    name: "x Relais Kühlschrank High"
    id: relais_compressor_high
    state_topic: buscontrol/switch/relais_compressor_high
    pin:
      mcp23xxx: mcp23017_back
      # Use pin A1
      number: 1
      mode:
        output: true
      inverted: true
  - platform: gpio
    name: "x Relais Lüftung"
    id: relais_fan
    state_topic: buscontrol/switch/relais_fan
    pin:
      mcp23xxx: mcp23017_back
      # Use pin A2
      number: 2
      mode:
        output: true
      inverted: true
  - platform: gpio
    name: "x Relais Heizung"
    id: relais_heating
    state_topic: buscontrol/switch/relais_heating
    pin:
      mcp23xxx: mcp23017_back
      # Use pin A3
      number: 3
      mode:
        output: true
      inverted: true
  - platform: gpio
    name: "x Relais Wifi"
    id: relais_wifi
    state_topic: buscontrol/switch/relais_wifi
    pin:
      mcp23xxx: mcp23017_back
      # Use pin A4
      number: 4
      mode:
        output: true
      inverted: true

# =============================================== PHYSISCHE SCHALTER ===============================================

binary_sensor:
  - platform: gpio # Schalter 1 für Kühlschrank/Eisfach
    id: switch1
    pin:
      number: GPIO02
      mode:
        input: true
        pullup: true
    filters:
        - invert:
    on_click:
    - min_length: 50ms
      max_length: 1000ms
      then:
        - switch.toggle: fridge_control
    - min_length: 1000ms
      max_length: 5000ms
      then:
        - switch.toggle: freezer_control
  - platform: gpio # Schalter 2 für Lüftung Kühlung/Entfeuchtung
    id: switch2
    pin:
      number: GPIO04
      mode:
        input: true
        pullup: true
    filters:
        - invert:
    on_click:
    - min_length: 50ms
      max_length: 1000ms
      then:
        - switch.toggle: cool_control
    - min_length: 1000ms
      max_length: 5000ms
      then:
        - switch.toggle: dry_control
  - platform: gpio # Schalter 3 für Standheizung
    id: switch3
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
    filters:
        - invert:
    on_click:
    - min_length: 50ms
      max_length: 1000ms
      then:
        - switch.toggle: heat_control
    - min_length: 1000ms
      max_length: 5000ms
      then:
        - switch.toggle: heat_control
  - platform: gpio # Schalter 4 für Licht/Radio
    id: switch4 
    pin:
      number: GPIO25
      mode:
        input: true
        pullup: true
    filters:
        - invert:
    on_click:
    - min_length: 50ms
      max_length: 1000ms
      then:
        - switch.toggle: wifi_control
    - min_length: 1000ms
      max_length: 5000ms
      then:
        - switch.toggle: music_control


