    multiplexer: 'A0_A1'
    gain: 6.144
    name: "3 Spannung Boardbatterie"
    state_topic: buscontrol/sensor/batt_board_voltage
    filters:
    - calibrate_linear:
      - 0.0 -> 0.0
      - -2.44 -> 14.0
  - platform: ads1115
