neues_skript:
  alias: FBHZcontrol Script
  sequence:
  - if:
    - condition: state
      entity_id: sensor.fbhzcontrol_mode
      state: turbo
    then:
    - service: modbus.write_register
      data:
        hub: Solvis
        unit: 1
        address: 3078
        value: 22
    - service: modbus.write_register
      data:
        hub: Solvis
        unit: 1
        address: 3082
        value: 80
  - if:
    - condition: state
      entity_id: sensor.fbhzcontrol_mode
      state: high
    then:
    - service: modbus.write_register
      data:
        hub: Solvis
        unit: 1
        address: 3078
        value: 21
    - service: modbus.write_register
      data:
        hub: Solvis
        unit: 1
        address: 3082
        value: 80
  - if:
    - condition: state
      entity_id: sensor.fbhzcontrol_mode
      state: low
    then:
    - service: modbus.write_register
      data:
        hub: Solvis
        unit: 1
        address: 3078
        value: 19
    - service: modbus.write_register
      data:
        hub: Solvis
        unit: 1
        address: 3082
        value: 60
  - service: mqtt.publish
    data:
      topic: FBHZcontrol/mode "{{ states('sensor.fbhzcontrol_mode') }}"
  mode: restart
daylogs:
  alias: Daylogs
  sequence:
  - service: input_number.set_value
    target:
      entity_id: input_number.solar_energy_sum_total_daylog
    data:
      value: '{{ states(''sensor.solar_energy_sum_day'') |float}}'
  - service: input_number.set_value
    target:
      entity_id: input_number.grid_energy_sum_daylog
    data:
      value: '{{ states(''sensor.grid_energy_sum_day'') |float}}'
  - service: input_number.set_value
    target:
      entity_id: input_number.water_daylog
    data:
      value: '{{ states(''sensor.water_today'') |float}}'
  - service: input_number.set_value
    target:
      entity_id: input_number.gas_energy_daylog
    data:
      value: '{{ states(''sensor.gas_energy_today'') |float}}'
  - service: input_number.set_value
    target:
      entity_id: input_number.solarthermie_energy_daylog
    data:
      value: '{{ states(''sensor.solarthermie_energy_day'') |float}}'
  - service: input_number.set_value
    target:
      entity_id: input_number.electricity_energy_daylog
    data:
      value: '{{ states(''sensor.electricity_energy_today'') |float}}'
  mode: single
