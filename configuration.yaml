input_number:
  solar_energy_sum_total_daylog:
    name: Solar Energy Sum Total Daylog
    min: 0
    max: 99999999
    step: 0.01
    unit_of_measurement: "kWh"
  grid_energy_sum_daylog:
    name: Grid Energy Sum Daylog
    min: 0
    max: 99999999
    step: 0.01
    unit_of_measurement: "kWh"
  water_daylog:
    name: Water Daylog
    min: 0
    max: 99999999
    step: 0.01
    unit_of_measurement: "L"
  gas_energy_daylog:
    name: Gas Energy Daylog
    min: 0
    max: 99999999
    step: 0.01
    unit_of_measurement: "kWh"
  solarthermie_energy_daylog:
    name: Solarthermie Energy Daylog
    min: 0
    max: 99999999
    step: 0.01
    unit_of_measurement: "kWh"
  electricity_energy_daylog:
    name: Electricity Energy Daylog
    min: 0
    max: 99999999
    step: 0.01
    unit_of_measurement: "kWh"

waste_collection_schedule:
  sources:
    - name: ics
      args:
        file: "www/abfallkalender.ics"
      customize:
        - type: Restmüll in Papenteich
          alias: restmuell
          icon: mdi:trash-can
        - type: Gelber Sack in Papenteich
          alias: gelbersack
          icon: mdi:recycle
        - type: Biomüll in Papenteich
          alias: biomuell
          icon: mdi:trash-can
        - type: Altpapier in Papenteich
          alias: altpapier
          icon: mdi:trash-can
        - type: Grünrückstände in Papenteich
          alias: gruenrueckstaende
          icon: mdi:leaf
        - type: Sperrmüll in Papenteich
          alias: sperrmuell
          icon: mdi:dump-truck
      calendar_title: Abfallkalender
  fetch_time: "04:00"
  day_switch_time: "12:00"

homeassistant:
  customize:
    sensor.naechster:
      unit_of_measurement: Tage

rest_command:
  soyo_notaus:
    url: "http://192.168.82.37:80/NotAus"
  soyo_notausaus:
    url: "http://192.168.82.37:80/NotAusAus"
  jbl_power:
    url: "http://192.168.82.140:80/httpapi.asp"
    method: POST
    payload: 'command=sendAppController&payload={"key_pressed": "power"}'
  jbl_volume_down:
    url: "http://192.168.82.140:80/httpapi.asp"
    method: POST
    payload: 'command=sendAppController&payload={"key_pressed": "volumeDown"}'
  jbl_volume_up:
    url: "http://192.168.82.140:80/httpapi.asp"
    method: POST
    payload: 'command=sendAppController&payload={"key_pressed": "volumeUp"}'

# MQTT Sensors
mqtt: !include mqtt.yaml
modbus: !include modbus.yaml
