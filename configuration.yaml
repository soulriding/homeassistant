  #   sensor:
  #     - name: "Solar Energy Sum Total Daylog"
  #       unique_id: "solar_energy_sum_total_daylog"
  #       unit_of_measurement: "kWh"
  #       device_class: energy
  #       state: "{{ states('sensor.solar_energy_sum_day') |float}}"
  #     - name: "Grid Energy Sum Daylog"
  #       unique_id: "grid_energy_sum_daylog"
  #       unit_of_measurement: "kWh"
  #       device_class: energy
  #       state: "{{ states('sensor.grid_energy_sum_day')|float}}"
  #     - name: "Water Daylog"
  #       unique_id: "water_daylog"
  #       unit_of_measurement: "L"
  #       state: "{{ states('sensor.water_today')|float}}"
  #     - name: "Gas Energy Daylog"
  #       unique_id: "gas_energy_daylog"
  #       unit_of_measurement: "kWh"
  #       device_class: energy
  #       state: "{{ states('sensor.gas_energy_today')|float}}"
  #     - name: "Solarthermie Energy Daylog"
  #       unique_id: "solarthermie_energy_daylog"
  #       unit_of_measurement: "kWh"
  #       device_class: energy
  #       state: "{{ states('sensor.solarthermie_energy_day')|float}}"
  #     - name: "Electricity Energy Daylog"
  #       unique_id: "electricity_energy_daylog"
